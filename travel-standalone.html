<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel · Don</title>
  <meta name="description" content="Don's personal travel log">

  <style>
/* Minimal reset */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html {
  -webkit-text-size-adjust: 100%;
  -moz-text-size-adjust: 100%;
  text-size-adjust: 100%;
  line-height: 1.5;
  tab-size: 4;
}
body {
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
img, picture, video, canvas, svg {
  display: block;
  max-width: 100%;
}
input, button, textarea, select {
  font: inherit;
  color: inherit;
}
button {
  cursor: pointer;
  border: none;
  background: none;
}
a {
  color: inherit;
  text-decoration: none;
}
ul, ol {
  list-style: none;
}
table {
  border-collapse: collapse;
  border-spacing: 0;
}

/* =============================================
   Personal Travel Site - 日式极简 Style
   ============================================= */

:root {
  --bg: #fafafa;
  --bg-alt: #f2f2f2;
  --text: #1a1a1a;
  --text-secondary: #999;
  --text-muted: #bbb;
  --border: #eee;
  --accent: #c93;
  --accent-hover: #a72;
  --accent-light: rgba(204, 153, 51, 0.08);
  --white: #fff;
  --max-width: 960px;
  --nav-height: 56px;
  --radius: 4px;
  --transition: 0.2s ease;
}

/* --- Base --- */
html {
  font-size: 16px;
}
body {
  font-family: system-ui, -apple-system, "Noto Sans SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.8;
  overflow-x: hidden;
}

/* --- Scrollbar --- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* --- Typography --- */
h1, h2, h3, h4 {
  line-height: 1.3;
  font-weight: 400;
}
h1 { font-size: 1.75rem; font-weight: 300; letter-spacing: 0.02em; }
h2 { font-size: 1.375rem; letter-spacing: 0.01em; }
h3 { font-size: 1.125rem; }
p { margin-bottom: 1em; }
small { font-size: 0.875rem; color: var(--text-secondary); }

/* --- Layout --- */
.container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
}

/* --- Navigation --- */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--nav-height);
  background: rgba(250, 250, 250, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.nav-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-brand {
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--text);
}
.nav-brand span {
  color: var(--accent);
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 0;
}
.nav-links a {
  font-size: 0.8rem;
  padding: 6px 14px;
  color: var(--text-secondary);
  transition: color var(--transition);
  position: relative;
  letter-spacing: 0.03em;
}
.nav-links a:hover,
.nav-links a.active {
  color: var(--text);
}
.nav-links a.active::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 14px;
  right: 14px;
  height: 1.5px;
  background: var(--accent);
}
.nav-links .lang-toggle {
  margin-left: 8px;
  padding: 4px 10px;
  font-size: 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  transition: all var(--transition);
}
.nav-links .lang-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* --- Main Content --- */
.main {
  margin-top: var(--nav-height);
  min-height: calc(100vh - var(--nav-height));
}
.page {
  display: none;
  padding: 60px 0 80px;
}
.page.active {
  display: block;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Empty State --- */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
}
.empty-state p {
  font-size: 0.9rem;
}

/* --- Section Title --- */
.section-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-secondary);
  margin-bottom: 32px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

/* ============================================
   TIMELINE VIEW
   ============================================ */
.timeline {
  position: relative;
}
.timeline::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 12px;
  width: 1px;
  background: var(--border);
}

.year-group {
  margin-bottom: 48px;
}
.year-group:last-child {
  margin-bottom: 0;
}
.year-label {
  font-size: 2rem;
  font-weight: 200;
  color: var(--text-muted);
  margin-bottom: 24px;
  padding-left: 40px;
  position: relative;
  line-height: 1;
}
.year-label::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 50%;
  width: 9px;
  height: 9px;
  background: var(--accent);
  border-radius: 50%;
  transform: translateY(-50%);
}

.trip-entry {
  position: relative;
  padding: 16px 0 16px 40px;
  cursor: pointer;
  transition: background var(--transition);
  border-radius: var(--radius);
  margin-left: 0;
}
.trip-entry:hover {
  background: var(--accent-light);
}
.trip-entry::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 24px;
  width: 9px;
  height: 9px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  border-radius: 50%;
  z-index: 1;
  transition: all var(--transition);
}
.trip-entry:hover::before {
  border-color: var(--accent);
  background: var(--accent);
}
.trip-entry-date {
  font-size: 0.75rem;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin-bottom: 2px;
}
.trip-entry-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
}
.trip-entry-title {
  font-size: 1rem;
  font-weight: 450;
}
.trip-entry-dest {
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.trip-entry-country {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.trip-entry-highlights {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.trip-entry-highlight {
  font-size: 0.72rem;
  padding: 2px 8px;
  background: var(--bg-alt);
  border-radius: 10px;
  color: var(--text-secondary);
}

/* ============================================
   FLIGHTS VIEW
   ============================================ */
.flights-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 48px;
}
.flights-stat {
  background: var(--white);
  padding: 24px 16px;
  text-align: center;
}
.flights-stat-num {
  font-size: 1.75rem;
  font-weight: 200;
  color: var(--text);
  line-height: 1.2;
}
.flights-stat-label {
  font-size: 0.72rem;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  margin-top: 4px;
}

.flights-year-group {
  margin-bottom: 32px;
}
.flights-year-label {
  font-size: 1.125rem;
  font-weight: 400;
  color: var(--text-secondary);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.flight-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}
.flight-card:last-child {
  border-bottom: none;
}
.flight-card:hover {
  background: var(--accent-light);
}
.flight-route {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 120px;
  font-weight: 450;
  font-size: 0.95rem;
}
.flight-arrow {
  color: var(--text-muted);
  font-size: 0.85rem;
}
.flight-info {
  flex: 1;
  min-width: 0;
}
.flight-meta {
  font-size: 0.82rem;
  color: var(--text-secondary);
}
.flight-meta span + span::before {
  content: '·';
  margin: 0 6px;
  color: var(--text-muted);
}
.flight-details {
  text-align: right;
  font-size: 0.8rem;
  color: var(--text-secondary);
  white-space: nowrap;
}
.flight-aircraft {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}
.flight-date {
  font-size: 0.72rem;
  color: var(--text-muted);
}

.flights-grouped-table {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--white);
}

/* ============================================
   PLANS VIEW
   ============================================ */
.plans-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.plans-column-header {
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 16px;
  text-transform: uppercase;
}
.plans-column-header[data-status="dreaming"] { border-color: var(--text-muted); }
.plans-column-header[data-status="planning"] { border-color: var(--accent); }
.plans-column-header[data-status="booked"] { border-color: #2a8; }
.plans-column-count {
  font-weight: 300;
  color: var(--text-secondary);
  margin-left: 4px;
}

.plan-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  transition: all var(--transition);
}
.plan-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.plan-card-title {
  font-size: 1rem;
  font-weight: 450;
  margin-bottom: 4px;
}
.plan-card-dest {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.plan-card-date {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.plan-card-notes {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.plan-card-priority {
  display: inline-block;
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 8px;
  background: var(--accent-light);
  color: var(--accent);
  margin-top: 8px;
}

/* ============================================
   MAP VIEW
   ============================================ */
.map-container {
  height: calc(100vh - var(--nav-height) - 80px);
  min-height: 400px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
#map {
  width: 100%;
  height: 100%;
}
/* Leaflet overrides */
.leaflet-container {
  font-family: inherit;
  background: var(--bg);
}
.leaflet-control-zoom a {
  color: var(--text) !important;
}
.trip-popup h3 {
  font-size: 0.9rem;
  font-weight: 450;
  margin-bottom: 2px;
}
.trip-popup p {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-bottom: 0;
}
.trip-popup a {
  display: inline-block;
  margin-top: 6px;
  font-size: 0.75rem;
  color: var(--accent);
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition);
}
.trip-popup a:hover {
  border-bottom-color: var(--accent);
}

/* ============================================
   TRIP DETAIL VIEW
   ============================================ */
.trip-detail-back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 24px;
  transition: color var(--transition);
}
.trip-detail-back:hover {
  color: var(--accent);
}
.trip-detail-header {
  margin-bottom: 32px;
}
.trip-detail-header h1 {
  font-size: 2rem;
  font-weight: 250;
  margin-bottom: 8px;
}
.trip-detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.trip-detail-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}
.trip-detail-highlights {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 32px;
}
.trip-detail-highlight {
  font-size: 0.78rem;
  padding: 4px 12px;
  background: var(--bg-alt);
  border-radius: 14px;
  color: var(--text-secondary);
}
.trip-detail-description {
  font-size: 0.95rem;
  line-height: 1.9;
  color: var(--text);
  max-width: 680px;
  margin-bottom: 40px;
}
.trip-detail-section-title {
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.trip-detail-flights {
  margin-bottom: 40px;
}
.trip-detail-flights .flight-card {
  padding-left: 0;
  padding-right: 0;
}
.trip-detail-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.trip-detail-gallery .placeholder-img {
  aspect-ratio: 4/3;
  background: var(--bg-alt);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
  .nav-links a {
    padding: 6px 10px;
    font-size: 0.75rem;
  }
  .nav-links .lang-toggle {
    padding: 3px 8px;
    font-size: 0.7rem;
  }
  .nav-brand {
    font-size: 0.9rem;
  }
  .page {
    padding: 40px 0 60px;
  }

  /* Timeline */
  .year-label {
    font-size: 1.5rem;
    padding-left: 36px;
  }
  .year-label::before,
  .timeline::before,
  .trip-entry::before {
    left: 6px;
  }
  .trip-entry {
    padding-left: 36px;
  }

  /* Flights */
  .flights-stats {
    grid-template-columns: repeat(2, 1fr);
  }
  .flight-card {
    flex-wrap: wrap;
    gap: 6px;
  }
  .flight-route {
    min-width: auto;
    width: 100%;
  }
  .flight-details {
    text-align: left;
    width: 100%;
  }

  /* Plans */
  .plans-board {
    grid-template-columns: 1fr;
    gap: 32px;
  }

  /* Trip Detail */
  .trip-detail-header h1 {
    font-size: 1.5rem;
  }
  .trip-detail-gallery {
    grid-template-columns: repeat(2, 1fr);
  }

  /* Map */
  .map-container {
    height: calc(100vh - var(--nav-height) - 120px);
    min-height: 300px;
  }
}

@media (max-width: 480px) {
  .container {
    padding: 0 16px;
  }
  .nav-inner {
    padding: 0 16px;
  }
  .nav-links a {
    padding: 6px 8px;
    font-size: 0.7rem;
  }
  .flights-stats {
    grid-template-columns: repeat(2, 1fr);
  }
  .flights-stat {
    padding: 16px 12px;
  }
  .flights-stat-num {
    font-size: 1.375rem;
  }
  .trip-detail-gallery {
    grid-template-columns: 1fr;
  }
}

/**
 * data.js — Data loader
 * Fetches and caches all JSON data in a single parallel load.
 */
const DataStore = {
  trips: null,
  flights: null,
  plans: null,
  loaded: false,

  async load() {
    if (this.loaded) return;
    try {
      const [tripsRes, flightsRes, plansRes] = await Promise.all([
        fetch('data/trips.json'),
        fetch('data/flights.json'),
        fetch('data/plans.json')
      ]);
      if (!tripsRes.ok || !flightsRes.ok || !plansRes.ok) {
        throw new Error('Failed to load data files');
      }
      this.trips = (await tripsRes.json()).trips;
      this.flights = (await flightsRes.json()).flights;
      this.plans = (await plansRes.json()).plans;
      this.loaded = true;
    } catch (err) {
      console.error('DataStore.load error:', err);
      this.trips = [];
      this.flights = [];
      this.plans = [];
      this.loaded = true;
    }
  },

  getTrips() { return this.trips || []; },
  getFlights() { return this.flights || []; },
  getPlans() { return this.plans || []; },

  getTripBySlug(slug) {
    return (this.trips || []).find(t => t.slug === slug) || null;
  },

  getFlightsByTrip(tripId) {
    return (this.flights || []).filter(f => f.tripId === tripId);
  },

  getTripsByYear() {
    const groups = {};
    for (const trip of (this.trips || [])) {
      const year = trip.dateRange.start.slice(0, 4);
      if (!groups[year]) groups[year] = [];
      groups[year].push(trip);
    }
    // Sort years descending
    const sorted = {};
    Object.keys(groups).sort((a, b) => b - a).forEach(y => { sorted[y] = groups[y]; });
    return sorted;
  },

  getFlightsByYear() {
    const groups = {};
    for (const flight of (this.flights || [])) {
      const year = flight.date.slice(0, 4);
      if (!groups[year]) groups[year] = [];
      groups[year].push(flight);
    }
    const sorted = {};
    Object.keys(groups).sort((a, b) => b - a).forEach(y => { sorted[y] = groups[y]; });
    return sorted;
  },

  getFlightStats() {
    const flights = this.flights || [];
    const airlines = new Set(flights.map(f => f.airline));
    const airports = new Set();
    flights.forEach(f => { airports.add(f.departure); airports.add(f.arrival); });
    const totalDist = flights.reduce((sum, f) => sum + (f.distance || 0), 0);
    return {
      total: flights.length,
      airlines: airlines.size,
      airports: airports.size,
      distance: totalDist
    };
  },

  getPlansByStatus() {
    const groups = { dreaming: [], planning: [], booked: [] };
    for (const p of (this.plans || [])) {
      if (groups[p.status]) groups[p.status].push(p);
    }
    // Sort by priority within each group
    for (const key of Object.keys(groups)) {
      groups[key].sort((a, b) => (a.priority || 99) - (b.priority || 99));
    }
    return groups;
  }
};

/**
 * timeline.js — Timeline view
 * Vertical timeline of past trips grouped by year.
 */
function renderTimeline() {
  const page = document.getElementById('page-timeline');
  if (!page) return;
  page.classList.add('active');

  const lang = App.getLang();
  const tripsByYear = DataStore.getTripsByYear();
  const years = Object.keys(tripsByYear);
  let html = '';

  const tl = (zh, en) => (lang === 'en' && en ? en : zh);

  if (years.length === 0) {
    html = `<div class="empty-state"><p>${lang === 'en' ? 'No trips yet.' : '还没有旅行记录。'}</p></div>`;
  } else {
    for (const year of years) {
      const trips = tripsByYear[year];
      html += `<div class="year-group">`;
      html += `<div class="year-label">${year}</div>`;
      for (const trip of trips) {
        const start = trip.dateRange.start;
        const end = trip.dateRange.end;
        const dateStr = `${start.slice(5)}–${end.slice(5)}`;
        const dest = tl(trip.destinations.join(' · '), trip.destinationsEn.join(' · '));
        const country = tl(trip.country, trip.countryEn);
        const title = tl(trip.title, trip.titleEn);
        const highlights = tl(trip.highlights, trip.highlightsEn);
        // Verify highlights is array
        const hlArr = Array.isArray(highlights) ? highlights : trip.highlights || [];

        html += `<div class="trip-entry" onclick="App.navigate('trip/${trip.slug}')">`;
        html += `<div class="trip-entry-date">${dateStr}</div>`;
        html += `<div class="trip-entry-header">`;
        html += `<span class="trip-entry-title">${title}</span>`;
        html += `<span class="trip-entry-dest">${dest}</span>`;
        html += `<span class="trip-entry-country">${country}</span>`;
        html += `</div>`;
        if (hlArr.length > 0) {
          html += `<div class="trip-entry-highlights">`;
          for (const h of hlArr) {
            html += `<span class="trip-entry-highlight">${h}</span>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
  }

  page.innerHTML = `<div class="container"><div class="timeline">${html}</div></div>`;
}

        html += `<div class="flight-route"><span>${f.departure}</span><span class="flight-arrow">→</span><span>${f.arrival}</span></div>`;
        html += `<div class="flight-info">`;
        html += `<div class="flight-meta"><span>${f.flightNo}</span><span>${airline}</span><span>${f.aircraft}</span></div>`;
        html += `<div class="flight-date">${f.date} · ${f.depTime}–${f.arrTime}</div>`;
        html += `</div>`;
        html += `<div class="flight-details">`;
        html += `<div>${f.duration}</div>`;
        html += `<div class="flight-aircraft">${tl('座位', 'Seat')} ${f.seat}</div>`;
        html += `</div>`;
        html += `</div>`;
      }
      html += `</div></div>`;
    }
  }

  html += '</div>';
  page.innerHTML = html;
}

/**
 * plans.js — Future plans view
 * Three-column kanban: Dreaming / Planning / Booked
 */
function renderPlans() {
  const page = document.getElementById('page-plans');
  if (!page) return;
  page.classList.add('active');

  const lang = App.getLang();
  const plansByStatus = DataStore.getPlansByStatus();
  const statuses = ['dreaming', 'planning', 'booked'];

  const tl = (zh, en) => (lang === 'en' && en ? en : zh);

  const statusLabels = {
    dreaming: tl('梦想', 'Dreaming'),
    planning: tl('规划中', 'Planning'),
    booked: tl('已预订', 'Booked')
  };

  let html = '<div class="container">';
  html += `<div class="section-title">${tl('未来计划', 'Future Plans')}</div>`;
  html += '<div class="plans-board">';

  for (const status of statuses) {
    const plans = plansByStatus[status] || [];
    html += `<div class="plans-column">`;
    html += `<div class="plans-column-header" data-status="${status}">${statusLabels[status]} <span class="plans-column-count">${plans.length}</span></div>`;

    if (plans.length === 0) {
      html += `<div style="font-size:0.8rem;color:var(--text-muted);padding:16px 0;">${tl('暂无', 'None')}</div>`;
    } else {
      for (const p of plans) {
        const title = tl(p.title, p.titleEn);
        const dest = tl(p.destinations.join(' · '), p.destinationsEn.join(' · '));
        const notes = tl(p.notes, p.notesEn);
        const hasDate = p.dateRange && (p.dateRange.start || p.dateRange.end);

        html += `<div class="plan-card">`;
        html += `<div class="plan-card-title">${title}</div>`;
        html += `<div class="plan-card-dest">${dest}</div>`;
        if (hasDate) {
          const dr = p.dateRange;
          const dateStr = dr.start ? `${dr.start}${dr.end ? ` – ${dr.end}` : ''}` : dr.end || '';
          html += `<div class="plan-card-date">${dateStr}</div>`;
        }
        if (notes) {
          html += `<div class="plan-card-notes">${notes}</div>`;
        }
        html += `</div>`;
      }
    }

    html += `</div>`;
  }

  html += '</div></div>';
  page.innerHTML = html;
}

/**
 * map.js — Interactive map view
 * Leaflet map with markers and polylines connecting destinations.
 */
let mapInstance = null;
let markersLayer = null;
let polylineLayer = null;

function renderMap() {
  const page = document.getElementById('page-map');
  if (!page) return;
  page.classList.add('active');

  const lang = App.getLang();
  const tl = (zh, en) => (lang === 'en' && en ? en : zh);

  page.innerHTML = `<div class="container"><div class="map-container" id="map-container"><div id="map"></div></div></div>`;

  // Wait for DOM update then init map
  setTimeout(() => initMap(tl), 100);
}

function initMap(tl) {
  const mapEl = document.getElementById('map');
  if (!mapEl) return;

  // Destroy previous instance
  if (mapInstance) {
    mapInstance.remove();
    mapInstance = null;
  }

  mapInstance = L.map('map', {
    center: [20, 100],
    zoom: 3,
    zoomControl: true,
    attributionControl: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
  }).addTo(mapInstance);

  markersLayer = L.layerGroup().addTo(mapInstance);
  polylineLayer = L.layerGroup().addTo(mapInstance);

  const trips = DataStore.getTrips();
  if (trips.length === 0) {
    // Show a gentle message overlay
    return;
  }

  // Build points array in chronological order
  const sorted = [...trips].sort((a, b) => a.dateRange.start.localeCompare(b.dateRange.start));
  const points = [];
  const visited = {};

  for (const trip of sorted) {
    const { lat, lng } = trip.coordinates;
    if (!lat || !lng) continue;

    const destKey = `${trip.country}-${trip.destinations[0]}`;
    visited[destKey] = (visited[destKey] || 0) + 1;
    const count = visited[destKey];

    const title = tl(trip.title, trip.titleEn);
    const dest = tl(trip.destinations.join(', '), trip.destinationsEn.join(', '));
    const dateStr = `${trip.dateRange.start} – ${trip.dateRange.end}`;

    const marker = L.circleMarker([lat, lng], {
      radius: count > 1 ? 10 : 7,
      color: '#c93',
      fillColor: '#c93',
      fillOpacity: 0.6,
      weight: 1.5
    });

    const popupContent = `<div class="trip-popup">
      <h3>${title}</h3>
      <p>${dest}</p>
      <p>${dateStr}</p>
      <a href="#trip/${trip.slug}">${tl('查看详情 →', 'View details →')}</a>
    </div>`;

    marker.bindPopup(popupContent);
    markersLayer.addLayer(marker);
    points.push([lat, lng]);
  }

  // Draw polylines connecting destinations in order
  if (points.length > 1) {
    const polyline = L.polyline(points, {
      color: '#c93',
      weight: 1.5,
      opacity: 0.4,
      dashArray: '6, 6'
    });
    polylineLayer.addLayer(polyline);

    // Fit bounds to show all markers
    mapInstance.fitBounds(polyline.getBounds().pad(0.2));
  } else if (points.length === 1) {
    mapInstance.setView(points[0], 6);
  }
}

/**
 * trip-detail.js — Single trip detail view
 * Shows full trip info, associated flights, placeholder gallery.
 */
function renderTripDetail(slug) {
  const page = document.getElementById('page-trip-detail');
  if (!page) return;
  page.classList.add('active');

  const lang = App.getLang();
  const tl = (zh, en) => (lang === 'en' && en ? en : zh);

  const trip = DataStore.getTripBySlug(slug);
  if (!trip) {
    page.innerHTML = `<div class="container"><div class="empty-state"><p>${tl('没有找到该旅行记录。', 'Trip not found.')}</p>
      <p><a href="#timeline" style="color:var(--accent);border-bottom:1px solid transparent;" 
      onmouseover="this.style.borderBottomColor='var(--accent)'" 
      onmouseout="this.style.borderBottomColor='transparent'"
      onclick="App.navigate('timeline')">${tl('返回时间线', 'Back to timeline')}</a></p></div></div>`;
    return;
  }

  const title = tl(trip.title, trip.titleEn);
  const dest = tl(trip.destinations.join(' · '), trip.destinationsEn.join(' · '));
  const country = tl(trip.country, trip.countryEn);
  const description = tl(trip.description, trip.descriptionEn);
  const highlights = tl(trip.highlights, trip.highlightsEn);
  const hlArr = Array.isArray(highlights) ? highlights : trip.highlights || [];
  const tags = trip.tags || [];
  const flights = DataStore.getFlightsByTrip(trip.id);

  let html = '<div class="container">';

  // Back button
  html += `<a href="#timeline" class="trip-detail-back" onclick="App.navigate('timeline');return false;">
    ← ${tl('返回时间线', 'Back')}
  </a>`;

  // Header
  html += `<div class="trip-detail-header">
    <h1>${title}</h1>
    <div class="trip-detail-meta">
      <span>${trip.dateRange.start} – ${trip.dateRange.end}</span>
      <span>${dest}</span>
      <span>${country}</span>
      ${trip.distance ? `<span>${trip.distance.toLocaleString()} km</span>` : ''}
    </div>
  </div>`;

  // Highlights
  if (hlArr.length > 0) {
    html += `<div class="trip-detail-highlights">`;
    for (const h of hlArr) {
      html += `<span class="trip-detail-highlight">${h}</span>`;
    }
    html += `</div>`;
  }

  // Description
  html += `<div class="trip-detail-description">${description}</div>`;

  // Flights
  if (flights.length > 0) {
    html += `<div class="trip-detail-section-title">${tl('航班', 'Flights')}</div>`;
    html += `<div class="trip-detail-flights"><div class="flights-grouped-table">`;
    for (const f of flights) {
      const airline = tl(f.airline, f.airlineEn);
      html += `<div class="flight-card">
        <div class="flight-route"><span>${f.departure}</span><span class="flight-arrow">→</span><span>${f.arrival}</span></div>
        <div class="flight-info">
          <div class="flight-meta"><span>${f.flightNo}</span><span>${airline}</span><span>${f.aircraft}</span></div>
          <div class="flight-date">${f.date} · ${f.depTime}–${f.arrTime}</div>
        </div>
        <div class="flight-details">
          <div>${f.duration}</div>
          <div class="flight-aircraft">${tl('座位', 'Seat')} ${f.seat}</div>
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }

  // Gallery placeholders
  html += `<div class="trip-detail-section-title">${tl('照片', 'Photos')}</div>`;
  html += `<div class="trip-detail-gallery">`;
  for (let i = 0; i < 6; i++) {
    html += `<div class="placeholder-img">${tl('照片 ' + (i + 1), 'Photo ' + (i + 1))}</div>`;
  }
  html += `</div>`;

  html += '</div>';
  page.innerHTML = html;
}


/* === Inline JS: app.js === */
/**
 * app.js — Application entry point
 * Hash router, navigation, language toggle.
 */

(function () {
  'use strict';

  let currentLang = 'zh';
  let currentRoute = '';
  let currentParams = {};

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  function init() {
    // Restore language preference
    const saved = localStorage.getItem('travel-lang');
    if (saved === 'en' || saved === 'zh') currentLang = saved;
    updateLangUI();

    // Nav event listeners
    $$('.nav-links a[href^="#"]').forEach(a => {
      a.addEventListener('click', (e) => {
        // Lang toggle is handled separately
        if (a.classList.contains('lang-toggle')) return;
      });
    });

    // Lang toggle
    $('.lang-toggle').addEventListener('click', (e) => {
      e.preventDefault();
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('travel-lang', currentLang);
      updateLangUI();
      renderCurrentView();
    });

    // Hash change
    window.addEventListener('hashchange', () => {
      renderCurrentView();
    });

    // Initial load & render
    DataStore.load().then(() => {
      renderCurrentView();
    });
  }

  function updateLangUI() {
    const toggle = $('.lang-toggle');
    if (toggle) toggle.textContent = currentLang === 'zh' ? 'EN' : '中文';
    document.documentElement.lang = currentLang;
  }

  function parseRoute() {
    const hash = window.location.hash.slice(1) || 'timeline';
    const parts = hash.split('/');
    const route = parts[0];
    const params = {};
    if (parts[1]) params.slug = parts[1];
    return { route, params };
  }

  function navigate(hash) {
    window.location.hash = hash;
  }

  function renderCurrentView() {
    const { route, params } = parseRoute();
    currentRoute = route;
    currentParams = params;

    // Hide all pages
    $$('.page').forEach(p => p.classList.remove('active'));

    // Update nav active state
    $$('.nav-links a[href^="#"]').forEach(a => {
      if (a.classList.contains('lang-toggle')) return;
      const href = a.getAttribute('href').slice(1);
      const isActive = route === 'timeline' && href === '' ? true :
                       route === href ? true : false;
      a.classList.toggle('active', isActive);
    });

    // Render the appropriate view
    switch (route) {
      case 'timeline':
      case '':
        renderTimeline();
        break;
      case 'flights':
        renderFlights();
        break;
      case 'plans':
        renderPlans();
        break;
      case 'map':
        renderMap();
        break;
      case 'trip':
        renderTripDetail(params.slug);
        break;
      default:
        navigate('timeline');
        break;
    }
  }

  // Public API for view modules
  window.App = {
    getLang: () => currentLang,
    navigate,
    renderCurrentView,
    $,
    $$,
    tl: function (zh, en) {
      return currentLang === 'en' && en ? en : zh;
    }
  };

  // Start when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
